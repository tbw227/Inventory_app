version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: firetrack
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/firetrack
      - DIRECT_URL=postgresql://postgres:postgres@postgres:5432/firetrack
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string-at-least-32-characters-long}
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
